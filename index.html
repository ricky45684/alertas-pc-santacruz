.dc input{width:auto;cursor:pointer}
.dc.cord{accent-color:#60a5fa}.dc.cord:hover{border-color:#60a5fa}

<div class="layout">
<div class="panel">

    <label class="lbl">Tipo de Alerta</label>

      <option value="viento">Viento</option>
      <option value="lluvia">Lluvia</option>
      <option value="nevada">Nevadas</option>
      <option value="tormenta">Tormenta</option>
      <option value="frio">Frio Extremo</option>
    </select>
  </div>
  <div class="field">
    <label class="lbl">Nivel de Alerta</label>
    <select id="nivel" onchange="updateRecs();render()">
      <option value="amarillo">Amarillo</option>
      <option value="naranja">Naranja</option>
      <option value="rojo">Rojo</option>
    </select>
  </div>
  <div class="field">
    <label class="lbl">Fecha del Evento</label>
    <input type="date" id="fEvento" oninput="render()">
  </div>

    <label class="lbl">Periodos Afectados</label>

      <label><input type="checkbox" id="pT"  onchange="render()"> Tarde (T)</label>
      <label><input type="checkbox" id="pN"  onchange="render()"> Noche (N)</label>
    </div>
  </div>
  <div class="field">
    <label class="lbl">Zonas Afectadas</label>
    <div id="deptosGrid">

      <div class="dg-depto"><div class="dg-nombre">Deseado</div><div class="dg-zonas">

        <label class="dc cos"><input type="checkbox" value="Costa de Deseado" onchange="render()"><span>Costa</span></label>
      </div></div>
      <div class="dg-depto"><div class="dg-nombre">Rio Chico</div><div class="dg-zonas">
        <label class="dc cord"><input type="checkbox" value="Cordillera de Rio Chico" onchange="render()"><span>Cordillera</span></label>
        <label class="dc mes"><input type="checkbox" value="Meseta de Rio Chico" onchange="render()"><span>Meseta</span></label>
      </div></div>
      <div class="dg-depto"><div class="dg-nombre">Corpen Aike</div><div class="dg-zonas">
        <label class="dc mes"><input type="checkbox" value="Meseta de Corpen Aike" onchange="render()"><span>Meseta</span></label>
        <label class="dc cos"><input type="checkbox" value="Costa de Corpen Aike" onchange="render()"><span>Costa</span></label>
      </div></div>
      <div class="dg-depto"><div class="dg-nombre">Lago Argentino</div><div class="dg-zonas">
        <label class="dc cord"><input type="checkbox" value="Cordillera de Lago Argentino" onchange="render()"><span>Cordillera</span></label>
        <label class="dc mes"><input type="checkbox" value="Meseta de Lago Argentino" onchange="render()"><span>Meseta</span></label>
      </div></div>
      <div class="dg-depto"><div class="dg-nombre">Guer Aike</div><div class="dg-zonas">
        <label class="dc cord"><input type="checkbox" value="Cordillera de Guer Aike" onchange="render()"><span>Cordillera</span></label>
        <label class="dc mes"><input type="checkbox" value="Meseta de Guer Aike" onchange="render()"><span>Meseta</span></label>
        <label class="dc cos"><input type="checkbox" value="Costa de Guer Aike" onchange="render()"><span>Costa</span></label>
      </div></div>
      <div class="dg-depto"><div class="dg-nombre">Magallanes</div><div class="dg-zonas">
        <label class="dc mes"><input type="checkbox" value="Meseta de Magallanes" onchange="render()"><span>Meseta</span></label>
        <label class="dc cos"><input type="checkbox" value="Costa de Magallanes" onchange="render()"><span>Costa</span></label>
      </div></div>
    </div>
  </div>
  <div class="field">
    <label class="lbl">Ubicaciones adicionales</label>
    <div id="locs"></div>
    <button class="badd" onclick="addLoc()">+ Agregar ubicacion</button>
  </div>
  <div class="field">
    <label class="lbl">Fecha y hora de emision</label>
    <input type="datetime-local" id="fEmision" oninput="render()">
  </div>
  <div class="field">
    <label class="lbl">Resumen del evento</label>
    <textarea id="resumen" oninput="updateRecs();render()" placeholder="Pega el texto del resumen del SMN..." rows="3"></textarea>
  </div>
  <div class="field">
    <label class="lbl">Recomendaciones en placa</label>
    <label class="rec-toggle">
      <input type="checkbox" id="chkRec" onchange="render()" checked>
      <span id="recToggleLabel">Mostrar recomendaciones</span>
    </label>
    <div class="rec-preview" id="recPreview"></div>
  </div>
  <button class="bgen" onclick="render()">ACTUALIZAR VISTA PREVIA</button>
  <button class="bsmn" onclick="window.open('https://www.smn.gob.ar/alertas','_blank','width=1200,height=800,scrollbars=yes,resizable=yes')">ABRIR SMN -- ALERTAS TEMPRANAS</button>
</div>
<div class="prev">
  <h2>VISTA PREVIA -- 1080 x 1080 px</h2>
  <canvas id="cnv" width="1080" height="1080"></canvas>
  <div class="acts">
    <button class="ba bdl" onclick="doDownload()">DESCARGAR PNG</button>
    <button class="ba bcp" onclick="doCopy()">COPIAR</button>
    <button class="ba brs" onclick="doReset()">RESET</button>
  </div>
  <p class="hint">Canvas nativo -- lo que ves es exactamente lo que descargas - 1080x1080px</p>
  <button id="btnInstalar" onclick="doInstall()">INSTALAR COMO APP</button>
</div>
</div>

function getZonas() {
  return [...document.querySelectorAll('#deptosGrid input:checked')].map(i=>i.value);
}
function getLocs() {
  const zonas = getZonas();
  const result = [];
  // Si todas las zonas de un depto estan seleccionadas -> mostrar solo el depto
  for(const [depto, zonasArr] of Object.entries(ZONAS_POR_DEPTO)) {
    const nombresZonas = zonasArr.map(z => NOMBRE_SMN[depto]?.[z]||z+' de '+depto);
    const todasActivas = nombresZonas.length > 0 && nombresZonas.every(n => zonas.includes(n));
    if(todasActivas) {
      result.push(depto === 'Guer Aike' ? 'G\u00fcer Aike' : depto);
    } else {
      // Solo las zonas individuales de este depto que esten activas
      nombresZonas.forEach(n => { if(zonas.includes(n)) result.push(n); });
    }
  }
  const extra = [...document.querySelectorAll('#locs .loc input')].map(i=>i.value.trim()).filter(Boolean);
  return [...result, ...extra];
}

function getFechaEvento() {
  const v = document.getElementById('fEvento').value;
  if(!v) return null;
  const [y,m,d] = v.split('-').map(Number);
  return {dia:DIAS[new Date(y,m-1,d).getDay()], fecha:String(d).padStart(2,'0')+'/'+String(m).padStart(2,'0')+'/'+y};
}
function getEmision() {
  let v = document.getElementById('fEmision').value;
  if(!v) return '';
  // Completar minutos faltantes
  if(v.length === 12) v = v + '00'; // formato HH: sin minutos
  if(!v.includes(':') || v.endsWith(':')) v = v.replace(/:$/, ':00');
  // Asegurar formato completo YYYY-MM-DDTHH:MM
  const parts = v.split('T');
  if(parts.length === 2) {
    const timeParts = parts[1].split(':');
    if(timeParts.length === 1) v = parts[0]+'T'+timeParts[0]+':00';
    if(timeParts.length === 2 && timeParts[1]==='') v = parts[0]+'T'+timeParts[0]+':00';
  }
  const dt = new Date(v+':00');
  if(isNaN(dt.getTime())) return '';
  const dd=String(dt.getDate()).padStart(2,'0'), mm=String(dt.getMonth()+1).padStart(2,'0');
  const hh=String(dt.getHours()).padStart(2,'0'), mn=String(dt.getMinutes()).padStart(2,'0');
  return 'Pronostico oficial de Alertas y Advertencias del dia '+DIAS[dt.getDay()]+' '+dt.getDate()+' de '+MESES[dt.getMonth()]+' de '+dt.getFullYear()+' - generado a las '+hh+':'+mn+' h';
}

function geoToCanvas(lon,lat,mx,my,mw,mh) {
  return [mx+(lon-MAP_BOUNDS.lonMin)/(MAP_BOUNDS.lonMax-MAP_BOUNDS.lonMin)*mw,
          my+(1-(lat-MAP_BOUNDS.latMin)/(MAP_BOUNDS.latMax-MAP_BOUNDS.latMin))*mh];
}

  const centroides = {
    'Deseado':[-67.8,-47.3],'Lago Buenos Aires':[-71.0,-47.2],'Rio Chico':[-71.4,-48.5],
    'Corpen Aike':[-69.2,-50.0],'Lago Argentino':[-72.0,-50.2],'Guer Aike':[-70.5,-51.5],'Magallanes':[-68.2,-48.9]
  };
  ctx.font='bold 13px Montserrat,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const [n,[lon,lat]] of Object.entries(centroides)) {
    const [cx,cy]=geoToCanvas(lon,lat,mapX,mapY,mapW,mapH);
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillText(n,cx+1,cy+1);
    ctx.fillStyle='#fff'; ctx.fillText(n,cx,cy);
  }
  ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.font='9px monospace';
  ctx.textAlign='left'; ctx.textBaseline='bottom'; ctx.fillText('IGN',mx+4,my+mh-3);
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function shadow(ctx,color,blur) { ctx.shadowColor=color||'rgba(0,0,0,0.85)'; ctx.shadowBlur=blur||8; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0; }
function noShadow(ctx) { ctx.shadowColor='transparent'; ctx.shadowBlur=0; }
function wrapText(ctx,text,x,y,maxW,lineH) {
  const words=text.split(' '); let line='', ly=y;
  for(const w of words) {
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,ly);line=w;ly+=lineH;}
    else line=test;
  }
  if(line) ctx.fillText(line,x,ly);
  return ly+lineH;
}
function measureWrap(ctx,text,maxW) {
  const words=text.split(' '); let line='', lines=1;
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){line=w;lines++;}else line=test;
  }
  return lines;
}

let fontsReady=false, renderPending=false;

function render() {
  if(!fontsReady){renderPending=true;return;}
  const cnv=document.getElementById('cnv');
  const ctx=cnv.getContext('2d');
  const W=1080,H=1080;
  ctx.clearRect(0,0,W,H);

  const tipo=document.getElementById('tipo').value;
  const nivel=document.getElementById('nivel').value;
  const cfg=TIPOS[tipo], niv=NIVELES[nivel], nivelColor=niv.color;
  const resumen=document.getElementById('resumen').value.trim();
  const mostrarRecs=document.getElementById('chkRec').checked;
  const recs=mostrarRecs?getCurrentRecs():[];

  // FONDO
  const img=IMGS[cfg.fondo];
  if(img&&img.complete&&img.naturalWidth>0){
    const sc=Math.max(W/img.naturalWidth,H/img.naturalHeight);
    const sw=img.naturalWidth*sc, sh=img.naturalHeight*sc;
    ctx.drawImage(img,(W-sw)/2,(H-sh)/2,sw,sh);
  } else {
    ctx.fillStyle='#1a2035'; ctx.fillRect(0,0,W,H);
  }
  ctx.fillStyle='rgba(5,10,25,0.40)'; ctx.fillRect(0,0,W,H);

  // HEADER
  ctx.fillStyle='rgba(8,14,32,0.88)'; ctx.fillRect(0,0,W,90);
  ctx.fillStyle=nivelColor; ctx.fillRect(0,87,W,3);
  shadow(ctx,'rgba(0,0,0,0.9)',10);
  ctx.font='800 48px Poppins,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#ffffff';
  ctx.fillText(cfg.titulo, W/2, 44);
  noShadow(ctx);

  // COLUMNAS
  const colL={x:18,y:106,w:400}, colR={x:432,y:106,w:W-432-18};

  // Badge NIVEL
  ctx.fillStyle=nivelColor; roundRect(ctx,colL.x,colL.y,colL.w,52,8); ctx.fill();
  shadow(ctx,'rgba(0,0,0,0.8)',6);
  ctx.font='800 34px Poppins,sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle=nivel==='amarillo'?'#f0f0f0':'#fff';
  ctx.fillText('NIVEL : '+niv.label, colL.x+16, colL.y+26);
  noShadow(ctx);

  // Badge FECHA
  const fechaEv=getFechaEvento();
  if(fechaEv){
    ctx.fillStyle=nivelColor; roundRect(ctx,colL.x,colL.y+60,colL.w,68,8); ctx.fill();
    shadow(ctx,'rgba(0,0,0,0.8)',6);
    const btc=nivel==='amarillo'?'#f0f0f0':'#fff';
    ctx.font='800 34px Poppins,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=btc;
    ctx.fillText(fechaEv.dia.toUpperCase(), colL.x+colL.w/2, colL.y+60+22);
    ctx.font='700 27px Poppins,sans-serif';
    ctx.fillText(fechaEv.fecha, colL.x+colL.w/2, colL.y+60+52);
    noShadow(ctx);
  }

  // MAPA
  const mapTop=colL.y+(fechaEv?138:60), mapH=450;
  drawMapa(ctx,colL.x,mapTop,colL.w,mapH,getZonas(),nivelColor);

  // PERIODOS M/M/T/N
  const periodos=getPeriodos();
  const perTop=mapTop+mapH+10;
  const TODOS=['M','M','T','N'], IDS=['pM1','pM2','pT','pN'];
  ctx.fillStyle='rgba(8,14,32,0.80)'; roundRect(ctx,colL.x,perTop,colL.w,60,8); ctx.fill();
  const pw=(colL.w-20)/4-8, totalW=4*(pw+8)-8;
  let px=colL.x+(colL.w-totalW)/2;
  TODOS.forEach((p,i)=>{
    const activo=document.getElementById(IDS[i]).checked;
    if(activo){ctx.fillStyle=nivelColor+'33'; roundRect(ctx,px,perTop+6,pw,48,6); ctx.fill();}
    ctx.strokeStyle=activo?nivelColor:'rgba(255,255,255,0.25)'; ctx.lineWidth=activo?2:1;
    roundRect(ctx,px,perTop+6,pw,48,6); ctx.stroke();
    shadow(ctx,'rgba(0,0,0,0.9)',5);
    ctx.font='bold 36px Anton,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=activo?nivelColor:'rgba(255,255,255,0.35)';
    ctx.fillText(p,px+pw/2,perTop+30);
    noShadow(ctx); px+=pw+8;
  });

  // COLUMNA DERECHA
  let ry=colR.y;

  // Fecha emision
  const emision=getEmision();
  if(emision){
    ctx.fillStyle='rgba(8,14,32,0.60)'; roundRect(ctx,colR.x,ry,colR.w,70,8); ctx.fill();
    shadow(ctx,'rgba(0,0,0,0.7)',4);
    ctx.font='700 15px "Roboto Condensed",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle='#94a3b8';
    ctx.fillText('Fecha de emision :', colR.x+14, ry+10);
    noShadow(ctx);
    ctx.font='14px "Roboto Condensed",sans-serif'; ctx.fillStyle='#d1d5db'; ctx.textBaseline='top';
    wrapText(ctx,emision,colR.x+14,ry+28,colR.w-24,17);
    ry+=90;
  }

  // Resumen
  if(resumen){
    ctx.font='20px "Roboto Condensed",sans-serif';
    const resLines=measureWrap(ctx,resumen,colR.w-28);
    const resH=44+resLines*27+12;
    ctx.fillStyle='rgba(8,14,32,0.60)'; roundRect(ctx,colR.x,ry,colR.w,resH,8); ctx.fill();
    shadow(ctx,'rgba(0,0,0,0.7)',4);
    ctx.font='700 18px "Roboto Condensed",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle='#f1f5f9';
    ctx.fillText('Resumen del evento:', colR.x+14, ry+10);
    ctx.strokeStyle=nivelColor+'88'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(colR.x+14,ry+32); ctx.lineTo(colR.x+colR.w-14,ry+32); ctx.stroke();
    noShadow(ctx);
    ctx.font='20px "Roboto Condensed",sans-serif'; ctx.fillStyle='#e2e8f0'; ctx.textBaseline='top';
    wrapText(ctx,resumen,colR.x+14,ry+38,colR.w-28,27);
    ry+=resH+18;
  }

  // Recomendaciones
  if(recs.length>0){
    const recH=38+recs.length*30+10;
    ctx.fillStyle='rgba(8,14,32,0.60)'; roundRect(ctx,colR.x,ry,colR.w,recH,8); ctx.fill();
    shadow(ctx,'rgba(0,0,0,0.7)',4);
    ctx.font='700 17px "Roboto Condensed",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle='#94a3b8';
    ctx.fillText('Recomendaciones:', colR.x+14, ry+10);
    noShadow(ctx);
    ctx.font='20px "Roboto Condensed",sans-serif'; ctx.fillStyle='#f1f5f9';
    recs.forEach((r,i)=>{ ctx.fillText((i+1)+'- '+r, colR.x+14, ry+30+i*30); });
    ry+=recH+18;
  }

  // Ubicaciones
  const locs=getLocs();
  if(locs.length>0){
    const locH=38+locs.length*30+10;
    ctx.fillStyle='rgba(8,14,32,0.60)'; roundRect(ctx,colR.x,ry,colR.w,locH,8); ctx.fill();
    shadow(ctx,'rgba(0,0,0,0.7)',4);
    ctx.font='700 18px "Roboto Condensed",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle='#f1f5f9';
    ctx.fillText('Ubicacion:', colR.x+14, ry+10);
    ctx.strokeStyle=nivelColor+'88'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(colR.x+14,ry+32); ctx.lineTo(colR.x+colR.w-14,ry+32); ctx.stroke();
    noShadow(ctx);
    ctx.font='21px "Roboto Condensed",sans-serif'; ctx.fillStyle='#f1f5f9';
    locs.forEach((l,i)=>{ ctx.fillText('- '+l, colR.x+16, ry+36+i*30); });
    ry+=locH+14;
  }

  // FOOTER
  const footH=110;
  ctx.fillStyle='rgba(8,14,32,0.90)'; ctx.fillRect(0,H-footH,W,footH);
  ctx.fillStyle=nivelColor; ctx.fillRect(0,H-footH,W,3);
  shadow(ctx,'rgba(0,0,0,0.8)',5);
  ctx.font='700 16px "Roboto Condensed",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle='#f1f5f9';
  ctx.fillText('Fuente: smn.gob.ar/alertas', 22, H-footH+14);
  noShadow(ctx);
  const logoGov=IMGS['logo_gov'];
  if(logoGov&&logoGov.complete&&logoGov.naturalWidth>0){
    const lh=72, lw=lh*(logoGov.naturalWidth/logoGov.naturalHeight);
    ctx.drawImage(logoGov,22,H-footH+34,lw,lh);
  }
  const logoPC=IMGS['logo_pc'];
  if(logoPC&&logoPC.complete&&logoPC.naturalWidth>0){
    const lh=92; ctx.drawImage(logoPC,W/2+20,H-footH+(footH-lh)/2,lh,lh);
  }
  const telX=W/2+108;
  shadow(ctx,'rgba(0,0,0,0.8)',6);
  ctx.font='22px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText('\ud83d\udcde',telX,H-footH+10);
  ctx.font='bold 58px Anton,sans-serif'; ctx.textBaseline='top'; ctx.fillStyle='#fff'; ctx.fillText('103',telX+22,H-footH+8);
  noShadow(ctx);
  ctx.font='700 13px "Roboto Condensed",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle='#d1d5db';
  shadow(ctx,'rgba(0,0,0,0.7)',4);
  ctx.fillText('Subsecretaria de Proteccion Civil',telX,H-footH+70);
  ctx.fillText('y Abordaje Integral de Emergencias y Catastrofes',telX,H-footH+86);
  noShadow(ctx);
}

function doDownload() {
  const tipo=document.getElementById('tipo').value, nivel=document.getElementById('nivel').value;
  const a=document.createElement('a');
  a.href=document.getElementById('cnv').toDataURL('image/png');
  a.download='alerta_PC_'+tipo+'_'+nivel+'_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.png';
  a.click();
}
async function doCopy() {
  try{
    const blob=await new Promise(r=>document.getElementById('cnv').toBlob(r,'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    alert('Imagen copiada al portapapeles!');
  }catch(e){alert('No se pudo copiar: '+e.message);}
}
function doReset() {
  ['tipo','nivel'].forEach(id=>document.getElementById(id).selectedIndex=0);
  ['fEvento','fEmision'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('resumen').value='';
  ['pM1','pM2','pT','pN'].forEach(id=>document.getElementById(id).checked=false);
  document.querySelectorAll('#deptosGrid input').forEach(i=>i.checked=false);
  document.getElementById('locs').innerHTML='';
  document.getElementById('chkRec').checked=true;
  updateRecs(); render();
}

document.fonts.ready.then(()=>{
  fontsReady=true;
  preloadImgs(()=>{updateRecs();render();if(renderPending){renderPending=false;render();}});
});
setTimeout(()=>{if(!fontsReady){fontsReady=true;preloadImgs(()=>{updateRecs();render();});}},3000);

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('btnInstalar').style.display='block';});
function doInstall(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(r=>{if(r.outcome==='accepted')document.getElementById('btnInstalar').style.display='none';deferredPrompt=null;});}

</script>
